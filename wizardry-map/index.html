<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="A Nether highway route planner and coordinate map for MuskWizard's Wizardry Map." />
<title>MuskWizard's Wizardry Map</title>
<style>
:root{--bg:#07100e;--panel:#091311e6;--line:#ffffff22;--text:#fff;--muted:#ffffffaa;--green:#34d399;--gold:#fbbf24}*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}button,input{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:minmax(0,1fr)380px;height:100vh}.map{min-width:0;position:relative}canvas{background:#163040;display:block;height:100%;width:100%}.panel,.active{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 60px #0008;left:16px;padding:14px;position:absolute;width:min(560px,calc(100vw - 420px))}.panel{top:16px}.active{bottom:16px}.brand{align-items:center;display:flex;gap:12px;margin-bottom:12px}.badge{background:var(--green);border-radius:8px;color:#06110d;display:grid;flex:0 0 44px;font-size:24px;font-weight:900;height:44px;place-items:center;width:44px}h1,h2,p{margin:0}h1{font-size:22px;line-height:1.05}.eyebrow{color:#a7f3d0d6;font-size:11px;font-weight:900;letter-spacing:0;margin-top:4px;text-transform:uppercase}.controls{display:grid;gap:10px;grid-template-columns:1fr 1fr auto}label{display:grid;gap:5px}label span,.label{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase}input{background:#0006;border:1px solid var(--line);border-radius:8px;color:var(--text);height:42px;outline:0;padding:0 11px;width:100%}input:focus{border-color:#34d399;box-shadow:0 0 0 3px #34d3992a}.primary,.ghost,.icon{border-radius:8px;font-weight:900;min-height:42px}.primary{align-self:end;background:var(--green);border:0;color:#06110d;padding:0 16px}.ghost,.icon{background:#ffffff1a;border:1px solid var(--line);color:var(--text)}.ghost.active{background:#fff;color:#07100e}.row{align-items:center;display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.seg{border:1px solid var(--line);border-radius:8px;display:inline-grid;grid-template-columns:1fr 1fr;overflow:hidden}.seg button{border:0;border-radius:0;min-width:104px}.pill{background:#0005;border:1px solid #ffffff1a;border-radius:8px;color:#ffffffc2;font-size:12px;font-weight:800;padding:8px 10px}.side{background:#091311;border-left:1px solid var(--line);display:grid;grid-template-rows:auto minmax(0,1fr);min-height:0}.side-head{border-bottom:1px solid var(--line);padding:16px}.side-head h2{font-size:26px;margin-top:5px}.list{display:grid;gap:10px;overflow-y:auto;padding:16px}.card{background:#ffffff0b;border:1px solid #ffffff1a;border-radius:8px;color:var(--text);padding:12px;text-align:left}.card.active{background:#fbbf241f;border-color:#fbbf24b3}.card strong{display:block;font-size:15px}.card span{color:var(--muted);display:block;font-size:12px;font-weight:700;line-height:1.45;margin-top:5px}.tools{bottom:16px;display:grid;gap:8px;position:absolute;right:16px}.icon{display:grid;font-size:20px;height:44px;place-items:center;width:44px}.active h2{font-size:20px;margin-top:4px}.metrics{display:grid;gap:8px;grid-template-columns:1fr 1fr;margin-top:12px}.metric{background:#0005;border:1px solid #ffffff1a;border-radius:8px;padding:10px}.metric strong{display:block;font-size:14px;margin-top:4px}@media(max-width:980px){body{overflow:auto}.app{grid-template-columns:1fr;grid-template-rows:68vh minmax(360px,1fr);height:auto;min-height:100vh}.panel,.active{left:10px;right:10px;width:auto}.side{border-left:0;border-top:1px solid var(--line)}}@media(max-width:560px){.controls,.metrics{grid-template-columns:1fr}h1{font-size:19px}}
</style>
</head>
<body>
<main class="app">
<section class="map"><canvas id="map"></canvas><section class="panel"><div class="brand"><div class="badge">W</div><div><h1>MuskWizard's Wizardry Map</h1><p class="eyebrow"><span id="count">0</span> wizardry coordinates</p></div></div><div class="controls"><label><span>X</span><input id="coordX" inputmode="numeric" value="0" /></label><label><span>Z</span><input id="coordZ" inputmode="numeric" value="0" /></label><button class="primary" id="plot">Plot Course</button></div><div class="row"><div class="seg"><button class="ghost active" id="overworld">Overworld</button><button class="ghost" id="nether">Nether</button></div><span class="pill" id="netherStart">Nether start 0 0</span><span class="pill" id="routeTotal">Select a point or plot a course</span></div></section><section class="active" id="activePanel" hidden><div class="label">Active destination</div><h2 id="activeTitle"></h2><div class="metrics"><div class="metric"><div class="label">Destination</div><strong id="activeCoords"></strong></div><div class="metric"><div class="label">Nether path</div><strong id="activePath"></strong></div></div></section><div class="tools"><button class="icon" id="zoomIn" aria-label="Zoom in">+</button><button class="icon" id="zoomOut" aria-label="Zoom out">-</button><button class="icon" id="fit" aria-label="Fit all">F</button></div></section>
<aside class="side"><div class="side-head"><div class="label">Course list</div><h2 id="sideTitle">Loading</h2></div><div class="list" id="list"></div></aside>
</main>
<script>
const highways=[{id:"x-plus",shortName:"+X",dx:1,dz:0,color:"#fb923c"},{id:"x-minus",shortName:"-X",dx:-1,dz:0,color:"#60a5fa"},{id:"z-plus",shortName:"+Z",dx:0,dz:1,color:"#22c55e"},{id:"z-minus",shortName:"-Z",dx:0,dz:-1,color:"#f43f5e"},{id:"x-plus-z-plus",shortName:"+X +Z",dx:1,dz:1,color:"#a78bfa"},{id:"x-plus-z-minus",shortName:"+X -Z",dx:1,dz:-1,color:"#facc15"},{id:"x-minus-z-plus",shortName:"-X +Z",dx:-1,dz:1,color:"#2dd4bf"},{id:"x-minus-z-minus",shortName:"-X -Z",dx:-1,dz:-1,color:"#f472b6"}];
let locations=[],dimension="overworld",routeLegs=[],selectedId="",activeLegIndex=0,dragging=null;const limit=64000,fmt=new Intl.NumberFormat("en-US"),canvas=document.getElementById("map"),ctx=canvas.getContext("2d"),list=document.getElementById("list"),coordX=document.getElementById("coordX"),coordZ=document.getElementById("coordZ"),sideTitle=document.getElementById("sideTitle"),routeTotal=document.getElementById("routeTotal"),netherStart=document.getElementById("netherStart"),activePanel=document.getElementById("activePanel"),activeTitle=document.getElementById("activeTitle"),activeCoords=document.getElementById("activeCoords"),activePath=document.getElementById("activePath"),ow=document.getElementById("overworld"),ne=document.getElementById("nether"),view={x:0,z:0,scale:.0008};
const fc=n=>fmt.format(Math.round(n)),fp=p=>fc(p.x)+" "+fc(p.z),cd=d=>d>=1000?(d/1000).toFixed(d>=10000?0:1)+"k":fc(d),pn=v=>{const n=Number(String(v).replaceAll(",",""));return Number.isFinite(n)?n:0},ln=l=>({x:l.netherX,z:l.netherZ}),lw=l=>({x:l.x,z:l.z});
function curN(){const x=pn(coordX.value),z=pn(coordZ.value);return dimension==="nether"?{x,z}:{x:Math.round(x/8),z:Math.round(z/8)}}function curW(){const x=pn(coordX.value),z=pn(coordZ.value);return dimension==="overworld"?{x,z}:{x:x*8,z:z*8}}function norm(h){const m=Math.hypot(h.dx,h.dz);return{x:h.dx/m,z:h.dz/m}}function nearest(p){return highways.map(h=>{const u=norm(h),t=Math.max(0,p.x*u.x+p.z*u.z),q={x:u.x*t,z:u.z*t};return{highway:h,point:q,t,distance:Math.hypot(p.x-q.x,p.z-q.z)}}).sort((a,b)=>a.distance-b.distance)[0]}function dedupe(a){return a.filter((p,i)=>!a[i-1]||Math.hypot(p.x-a[i-1].x,p.z-a[i-1].z)>.5)}function leg(from,loc){const to=ln(loc),a=nearest(from),b=nearest(to),same=a.highway.id===b.highway.id,hd=same?Math.abs(a.t-b.t):a.t+b.t,path=same?[from,a.point,b.point,to]:[from,a.point,{x:0,z:0},b.point,to];return{location:loc,from,to,fromJoin:a,toJoin:b,distance:a.distance+hd+b.distance,path:dedupe(path)}}function course(start){const left=[...locations],legs=[];let cur=start;while(left.length){let bi=0,b=leg(cur,left[0]);for(let i=1;i<left.length;i++){const c=leg(cur,left[i]);if(c.distance<b.distance){bi=i;b=c}}legs.push(b);cur=b.to;left.splice(bi,1)}return legs}
function ep(h){return{x:Math.sign(h.dx)*limit*8,z:Math.sign(h.dz)*limit*8}}function ts(p){return{x:canvas.clientWidth/2+(p.x-view.x)*view.scale,y:canvas.clientHeight/2+(p.z-view.z)*view.scale}}function fs(x,y){return{x:view.x+(x-canvas.clientWidth/2)/view.scale,z:view.z+(y-canvas.clientHeight/2)/view.scale}}function tc(x,z){const h=Math.sin(x*.000043+z*.000071)+Math.sin(x*.00019-z*.00013);if(Math.min(Math.abs(x),Math.abs(z))<950)return"#857659";if(h<-.68)return"#254b7a";if(h<-.5)return"#d3c27f";if(h>1.1)return"#829077";return h>.35?"#2e7437":"#1f5d2f"}function terrain(){const w=canvas.clientWidth,h=canvas.clientHeight,c=Math.max(18,Math.min(64,Math.round(16000*view.scale)));for(let y=0;y<h;y+=c)for(let x=0;x<w;x+=c){const p=fs(x+c/2,y+c/2);ctx.fillStyle=tc(p.x,p.z);ctx.fillRect(x,y,c+1,c+1)}}function line(a,b,color,width=2,dash=[]){const s=ts(a),e=ts(b);ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width;ctx.setLineDash(dash);ctx.lineCap="round";ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.stroke();ctx.restore()}function drawRoute(l,active){ctx.save();ctx.strokeStyle=active?"#fbbf24":"rgba(217,249,157,.55)";ctx.lineWidth=active?7:3;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();l.path.map(p=>({x:p.x*8,z:p.z*8})).forEach((p,i)=>{const s=ts(p);i?ctx.lineTo(s.x,s.y):ctx.moveTo(s.x,s.y)});ctx.stroke();ctx.restore()}function marker(loc,order){const s=ts(lw(loc)),sel=loc.id===selectedId,act=routeLegs[activeLegIndex]?.location.id===loc.id,r=act?14:sel?12:9;ctx.save();ctx.fillStyle=act?"#fbbf24":sel?"#34d399":"rgba(7,16,14,.92)";ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=act||sel?"#06110d":"#fff";ctx.font="900 10px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(order||Number(loc.id.replace("l",""))),s.x,s.y);ctx.restore()}function draw(){const ratio=devicePixelRatio||1,w=canvas.clientWidth,h=canvas.clientHeight;if(canvas.width!==Math.round(w*ratio)||canvas.height!==Math.round(h*ratio)){canvas.width=Math.round(w*ratio);canvas.height=Math.round(h*ratio)}ctx.setTransform(ratio,0,0,ratio,0,0);terrain();for(let x=-640000;x<=640000;x+=80000)line({x,z:-560000},{x,z:560000},"rgba(255,255,255,.1)",1);for(let z=-560000;z<=560000;z+=80000)line({x:-640000,z},{x:640000,z},"rgba(255,255,255,.1)",1);highways.forEach(h=>line({x:0,z:0},ep(h),h.color,2.5,[10,10]));routeLegs.forEach((l,i)=>drawRoute(l,i===activeLegIndex));const order=new Map(routeLegs.map((l,i)=>[l.location.id,i+1]));locations.forEach(l=>marker(l,order.get(l.id)));const c=ts(curW());ctx.save();ctx.fillStyle="rgba(20,184,166,.25)";ctx.beginPath();ctx.arc(c.x,c.y,13,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ccfbf1";ctx.strokeStyle="#0f766e";ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.x,c.y,6,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}
function fit(points,pad=70){const b=points.reduce((a,p)=>({minX:Math.min(a.minX,p.x),maxX:Math.max(a.maxX,p.x),minZ:Math.min(a.minZ,p.z),maxZ:Math.max(a.maxZ,p.z)}),{minX:Infinity,maxX:-Infinity,minZ:Infinity,maxZ:-Infinity});view.x=(b.minX+b.maxX)/2;view.z=(b.minZ+b.maxZ)/2;view.scale=Math.max(.00035,Math.min(.08,Math.min((canvas.clientWidth-pad*2)/Math.max(b.maxX-b.minX,1000),(canvas.clientHeight-pad*2)/Math.max(b.maxZ-b.minZ,1000))));draw()}function zoom(m,ax=canvas.clientWidth/2,ay=canvas.clientHeight/2){const p=fs(ax,ay),ns=Math.max(.00035,Math.min(.08,view.scale*m));view.x=p.x-(ax-canvas.clientWidth/2)/ns;view.z=p.z-(ay-canvas.clientHeight/2)/ns;view.scale=ns;draw()}function renderList(){list.innerHTML="";const items=routeLegs.length?routeLegs:locations.map(location=>({location,distance:0,toJoin:nearest(ln(location))}));items.forEach((it,i)=>{const l=it.location,b=document.createElement("button");b.className="card"+(l.id===selectedId?" active":"");b.innerHTML="<strong>"+(routeLegs.length?"Stop "+(i+1)+": ":"")+l.name+"</strong><span>OW "+fp(lw(l))+" / Nether "+fp(ln(l))+"</span><span>"+(routeLegs.length?cd(it.distance)+" nether blocks this leg / ":"")+it.toJoin.highway.shortName+"</span>";b.onclick=()=>{selectedId=l.id;const ri=routeLegs.findIndex(x=>x.location.id===l.id);if(ri>=0)activeLegIndex=ri;updateActive();renderList();draw()};list.appendChild(b)});sideTitle.textContent=routeLegs.length?"Nearest-first route":"Select or plot"}function updateActive(){const loc=locations.find(x=>x.id===selectedId)||locations[0],al=routeLegs[activeLegIndex];activePanel.hidden=false;if(al){activeTitle.textContent="Stop "+(activeLegIndex+1)+": "+al.location.name;activeCoords.textContent="OW "+fp(lw(al.location))+" / Nether "+fp(ln(al.location));activePath.textContent=al.toJoin.highway.shortName+" to "+fp(al.toJoin.point)}else{activeTitle.textContent=loc.name;activeCoords.textContent="OW "+fp(lw(loc))+" / Nether "+fp(ln(loc));const j=nearest(ln(loc));activePath.textContent=j.highway.shortName+" spur "+cd(j.distance)}netherStart.textContent="Nether start "+fp(curN())}function plot(){routeLegs=course(curN());activeLegIndex=0;selectedId=routeLegs[0]?.location.id||locations[0].id;routeTotal.textContent=routeLegs.length+" stops / "+cd(routeLegs.reduce((s,l)=>s+l.distance,0))+" n-blocks";updateActive();renderList();draw()}function setDim(d){if(d===dimension)return;const old=curN();dimension=d;if(d==="overworld"){coordX.value=Math.round(old.x*8);coordZ.value=Math.round(old.z*8)}else{coordX.value=Math.round(old.x);coordZ.value=Math.round(old.z)}ow.classList.toggle("active",d==="overworld");ne.classList.toggle("active",d==="nether");updateActive();draw()}function hit(x,y){let best=null,bd=Infinity;locations.forEach(l=>{const s=ts(lw(l)),d=Math.hypot(s.x-x,s.y-y);if(d<bd){best=l;bd=d}});return bd<=18?best:null}
async function boot(){locations=await fetch("locations.json").then(r=>r.json());selectedId=locations[0].id;document.getElementById("count").textContent=locations.length;const pts=[{x:0,z:0},...locations.map(({x,z})=>({x,z})),...highways.map(h=>({x:Math.sign(h.dx)*limit*8,z:Math.sign(h.dz)*limit*8}))];document.getElementById("plot").onclick=plot;document.getElementById("zoomIn").onclick=()=>zoom(1.35);document.getElementById("zoomOut").onclick=()=>zoom(.74);document.getElementById("fit").onclick=()=>fit(pts);ow.onclick=()=>setDim("overworld");ne.onclick=()=>setDim("nether");coordX.oninput=coordZ.oninput=()=>{updateActive();draw()};addEventListener("resize",()=>fit(pts));canvas.addEventListener("wheel",e=>{e.preventDefault();const r=canvas.getBoundingClientRect();zoom(e.deltaY<0?1.18:.84,e.clientX-r.left,e.clientY-r.top)},{passive:false});canvas.onpointerdown=e=>{const r=canvas.getBoundingClientRect(),h=hit(e.clientX-r.left,e.clientY-r.top);if(h){selectedId=h.id;const ri=routeLegs.findIndex(l=>l.location.id===h.id);if(ri>=0)activeLegIndex=ri;updateActive();renderList();draw();return}canvas.setPointerCapture(e.pointerId);dragging={x:e.clientX,y:e.clientY,vx:view.x,vz:view.z}};canvas.onpointermove=e=>{if(!dragging)return;view.x=dragging.vx-(e.clientX-dragging.x)/view.scale;view.z=dragging.vz-(e.clientY-dragging.y)/view.scale;draw()};canvas.onpointerup=()=>dragging=null;fit(pts);renderList();updateActive()}boot().catch(err=>{sideTitle.textContent="Load failed";console.error(err)});
</script>
</body>
</html>
